<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web GIS Macau Peninsula - Dashboard Expert</title>
<meta name="description" content="Dashboard GIS interaktif fasilitas kesehatan dan jaringan jalan Semenanjung Macau">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0f172a;display:flex;overflow:hidden;height:100vh}

/* === SIDEBAR === */
.sidebar{width:340px;height:100vh;background:linear-gradient(180deg,#0b1120,#162032);display:flex;flex-direction:column;border-right:1px solid rgba(99,102,241,0.15);z-index:10;flex-shrink:0;transition:margin-left 0.3s ease}
.sidebar.collapsed{margin-left:-340px}
.sb-header{padding:18px 20px 14px;border-bottom:1px solid rgba(99,102,241,0.12)}
.sb-header h1{font-size:16px;font-weight:800;background:linear-gradient(90deg,#a5b4fc,#c4b5fd);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sb-header p{font-size:10px;color:#475569;margin-top:2px;letter-spacing:0.5px}
.sb-search{padding:10px 16px}
.sb-search input{width:100%;padding:9px 12px 9px 34px;border-radius:8px;border:1px solid rgba(99,102,241,0.2);background:rgba(30,41,59,0.7);color:#e2e8f0;font-size:12px;font-family:'Inter',sans-serif;outline:none;transition:border-color 0.2s}
.sb-search input:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,0.1)}
.sb-search{position:relative}
.sb-search::before{content:'🔍';position:absolute;left:28px;top:50%;transform:translateY(-50%);font-size:13px}

/* Stats */
.sb-stats{padding:10px 16px;display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.st{background:rgba(30,41,59,0.5);border-radius:10px;padding:8px 6px;text-align:center;border:1px solid rgba(99,102,241,0.08)}
.st-n{font-size:20px;font-weight:800;background:linear-gradient(135deg,#818cf8,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.st-l{font-size:8px;color:#475569;text-transform:uppercase;letter-spacing:0.5px;margin-top:1px;font-weight:600}

/* Legend Filter */
.sb-legend{padding:8px 16px}
.sb-legend h3{font-size:10px;color:#475569;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;font-weight:700}
.lg-grid{display:flex;flex-wrap:wrap;gap:5px}
.lg-btn{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;border:1px solid rgba(99,102,241,0.15);background:rgba(30,41,59,0.4);cursor:pointer;transition:all 0.2s;font-size:10px;color:#94a3b8;font-weight:500}
.lg-btn:hover{border-color:rgba(99,102,241,0.4);background:rgba(99,102,241,0.1)}
.lg-btn.active{border-color:rgba(99,102,241,0.5);background:rgba(99,102,241,0.15);color:#c7d2fe}
.lg-btn.dimmed{opacity:0.35}
.lg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;position:relative}
.lg-dot::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:4px;height:4px;border-radius:50%;background:#000}
.btn-all{padding:4px 12px;border-radius:20px;border:1px solid rgba(99,102,241,0.25);background:linear-gradient(135deg,rgba(99,102,241,0.15),rgba(139,92,246,0.15));color:#a5b4fc;font-size:10px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.2s}
.btn-all:hover{background:linear-gradient(135deg,rgba(99,102,241,0.3),rgba(139,92,246,0.3))}
.road-legend{margin-top:10px}
.rl-row{display:flex;align-items:center;gap:7px;margin-bottom:3px}
.rl-line{height:3px;border-radius:2px;background:#888}
.rl-lbl{font-size:10px;color:#64748b}

/* Results List */
.sb-list{flex:1;overflow-y:auto;padding:4px 12px}
.sb-list::-webkit-scrollbar{width:3px}
.sb-list::-webkit-scrollbar-thumb{background:#1e293b;border-radius:3px}
.ri{padding:8px 10px;border-radius:8px;cursor:pointer;margin-bottom:2px;transition:background 0.15s;display:flex;align-items:center;gap:9px}
.ri:hover{background:rgba(99,102,241,0.12)}
.ri-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;position:relative}
.ri-dot::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:4px;height:4px;border-radius:50%;background:#000}
.ri-info{overflow:hidden}
.ri-name{font-size:11px;color:#cbd5e1;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ri-cat{font-size:9px;color:#475569;text-transform:capitalize}
.no-result{text-align:center;padding:24px;color:#334155;font-size:11px}

/* Toggle Button */
.menu-btn{position:fixed;top:10px;left:10px;z-index:20;width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;color:#fff;font-size:16px;cursor:pointer;display:none;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(99,102,241,0.4)}

/* === MAP === */
.map-wrap{flex:1;position:relative}
#map{width:100%;height:100%;z-index:1}

/* Popup */
.leaflet-popup-content-wrapper{background:linear-gradient(135deg,#1e293b,#283548)!important;border-radius:12px!important;border:1px solid rgba(99,102,241,0.25)!important;box-shadow:0 10px 40px rgba(0,0,0,0.5)!important}
.leaflet-popup-tip{background:#283548!important}
.leaflet-popup-content{margin:0!important;padding:0!important}
.pu{padding:14px 16px}
.pu-name{font-size:14px;font-weight:700;margin-bottom:6px;background:linear-gradient(90deg,#a5b4fc,#c4b5fd);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.pu-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:9px;font-weight:600;margin-bottom:8px}
.pu-row{font-size:11px;color:#94a3b8;margin-bottom:4px;display:flex;gap:4px}
.pu-row b{color:#cbd5e1;min-width:52px}
.pu-link{display:inline-block;margin-top:4px;color:#818cf8;text-decoration:none;font-size:11px;font-weight:500}
.pu-link:hover{text-decoration:underline}

/* Zoom */
.leaflet-control-zoom a{background:rgba(15,23,42,0.92)!important;color:#a5b4fc!important;border-color:rgba(99,102,241,0.25)!important}
.leaflet-control-zoom a:hover{background:rgba(99,102,241,0.3)!important;color:#fff!important}
.leaflet-control-attribution{font-size:9px!important;background:rgba(255,255,255,0.7)!important}

@media(max-width:768px){
.sidebar{position:fixed;top:0;left:0;width:300px;height:100vh;z-index:1000}
.sidebar.collapsed{margin-left:-300px}
.menu-btn{display:flex}
}
</style>
</head>
<body>
<button class="menu-btn" onclick="document.getElementById('sb').classList.toggle('collapsed')">&#9776;</button>

<div class="sidebar" id="sb">
<div class="sb-header">
<h1>&#127973; Web GIS Macau Peninsula</h1>
<p>Fasilitas Kesehatan &amp; Jaringan Jalan &mdash; Expert Dashboard</p>
</div>
<div class="sb-search"><input type="text" id="qInput" placeholder="Cari nama fasilitas..."></div>
<div class="sb-stats">
<div class="st"><div class="st-n" id="cntH">0</div><div class="st-l">Hospital</div></div>
<div class="st"><div class="st-n" id="cntC">0</div><div class="st-l">Clinic</div></div>
<div class="st"><div class="st-n" id="cntP">0</div><div class="st-l">Pharmacy</div></div>
</div>
<div class="sb-legend">
<h3>Filter Kategori</h3>
<div class="lg-grid" id="lgGrid">
<button class="btn-all" id="btnAll" onclick="resetFilter()">Tampilkan Semua</button>
</div>
<div class="road-legend" style="margin-top:12px">
<h3 style="font-size:10px;color:#475569;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;font-weight:700">Jaringan Jalan</h3>
<div class="rl-row"><div class="rl-line" style="width:28px;height:5px"></div><span class="rl-lbl">Motorway</span></div>
<div class="rl-row"><div class="rl-line" style="width:24px;height:4px"></div><span class="rl-lbl">Primary</span></div>
<div class="rl-row"><div class="rl-line" style="width:20px;height:3px"></div><span class="rl-lbl">Secondary</span></div>
<div class="rl-row"><div class="rl-line" style="width:16px;height:2px"></div><span class="rl-lbl">Tertiary</span></div>
</div>
</div>
<div class="sb-list" id="resList"></div>
</div>

<div class="map-wrap"><div id="map"></div></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ========== CONFIG ==========
var CC={hospital:'#FF0000',clinic:'#00BFFF',pharmacy:'#CCFF00',doctor:'#00CED1',dentist:'#FFA500',audiologist:'#0000FF',blood_donation:'#00FF00',hospice:'#FFFF00',laboratory:'#FF4500'};
var CL={hospital:'Hospital',clinic:'Clinic',pharmacy:'Pharmacy',doctor:'Doctor',dentist:'Dentist',audiologist:'Audiologist',blood_donation:'Blood Donation',hospice:'Hospice',laboratory:'Laboratory'};
var RW={motorway:5,primary:4,secondary:3,tertiary:2};

// ========== MAP ==========
var map=L.map('map',{center:[22.198,113.544],zoom:14,zoomControl:false});
L.control.zoom({position:'bottomright'}).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{
attribution:'&copy; <a href="https://carto.com/">CARTO</a> &copy; <a href="https://osm.org/copyright">OSM</a>',subdomains:'abcd',maxZoom:19}).addTo(map);

// ========== HEALTH DATA (40+ points) ==========
var H=[
["Hospital Conde S. Januário","hospital","Estrada do Visconde de S. Januário",113.5477,22.1945],
["Hospital Kiang Wu","hospital","Rua de Coelho do Amaral",113.5415,22.1985],
["Hospital Univ. de Macau","hospital","Av. Sun Yat Sen",113.5440,22.1908],
["Clínica Tap Seac","clinic","Av. Conselheiro F. de Almeida",113.5465,22.1990],
["Clínica São Januário","clinic","Rua de Cinco de Outubro",113.5395,22.1925],
["Clínica Popular","clinic","Rua do Campo",113.5450,22.1960],
["Clínica Fai Chi Kei","clinic","Rua Nova do Patane",113.5365,22.2035],
["Clínica Areia Preta","clinic","Rua do Pátio do Sol",113.5530,22.2070],
["Clínica Flora","clinic","Rua da Flora Sintra",113.5388,22.1948],
["Clínica Guia","clinic","Rampa da Guia",113.5505,22.1975],
["Clínica Porto Interior","clinic","Rua das Lorchas",113.5345,22.1915],
["Farmácia Popular","pharmacy","Av. de Almeida Ribeiro 42",113.5400,22.1932],
["Farmácia Vitória","pharmacy","Av. de Almeida Ribeiro 78",113.5435,22.1935],
["Farmácia Kin Heng","pharmacy","Rua de Cinco de Outubro 15",113.5410,22.1940],
["Farmácia N.S. Fátima","pharmacy","Rua Almirante Costa Cabral",113.5480,22.2020],
["Farmácia San Kei","pharmacy","Av. de Horta e Costa 30",113.5445,22.2010],
["Farmácia Patane","pharmacy","Rua da Tercena 8",113.5358,22.1975],
["Farmácia Luen Heng","pharmacy","Rua do Campo 55",113.5460,22.1965],
["Farmácia S. Paulo","pharmacy","Rua de S. Paulo 20",113.5392,22.1955],
["Farmácia Iao Han","pharmacy","Av. do Almirante Lacerda 12",113.5490,22.2048],
["Farmácia Heng Tai","pharmacy","Rua do Tarrafeiro",113.5375,22.1935],
["Dr. Chan Medical","doctor","Av. de Horta e Costa 12",113.5442,22.1995],
["Dr. Wong Surgery","doctor","Rua de Pedro Coutinho 5",113.5470,22.1970],
["Dr. Li Family Clinic","doctor","Rua de Francisco Xavier Pereira",113.5420,22.1968],
["Dr. Ho General","doctor","Rua do Tap Seac",113.5455,22.1998],
["Dr. Lam Practice","doctor","Rua da Praia do Manduco",113.5510,22.1952],
["Dentista Sorriso","dentist","Av. de Almeida Ribeiro 100",113.5455,22.1930],
["Dental Brilhante","dentist","Rua P. Nolasco da Silva",113.5490,22.1955],
["Macau Dental Care","dentist","Rua Dr. Pedro José Lobo",113.5425,22.1915],
["Smile Dental Macau","dentist","Rua do Campo 18",113.5438,22.1958],
["Centro Audiológico","audiologist","Rua do Campo 30",113.5448,22.1953],
["Macau Hearing Center","audiologist","Av. Conselheiro F. de Almeida 22",113.5458,22.1982],
["Audio Care Macau","audiologist","Rua de S. Domingos 8",113.5405,22.1943],
["Centro Sangue Macau","blood_donation","Estrada Visconde S. Januário",113.5472,22.1938],
["Posto Doação Kiang Wu","blood_donation","Rua de Coelho do Amaral 10",113.5418,22.1990],
["Blood Bank Fátima","blood_donation","Rua Ribeira do Patane",113.5370,22.2015],
["Hospício Macau Care","hospice","Rua de Tomás Vieira",113.5380,22.2005],
["Casa Repouso S. José","hospice","Calçada Igreja S. Lázaro",113.5408,22.1963],
["Lar Esperança Macau","hospice","Rua da Barca",113.5352,22.1940],
["Lab Central Macau","laboratory","Rua de S. Domingos 15",113.5412,22.1948],
["Lab Diagnóstico Fátima","laboratory","Av. Almirante Lacerda",113.5500,22.2045],
["Lab Bio Macau","laboratory","Rua Tomé Pires",113.5485,22.1985],
["Lab MedTech","laboratory","Rua da Sé",113.5420,22.1930]
];

// ========== ROAD DATA ==========
var R=[
["Ponte Gov. Nobre de Carvalho","motorway",[[113.549,22.187],[113.551,22.190],[113.552,22.194],[113.5525,22.197]]],
["Av. de Almeida Ribeiro","primary",[[113.535,22.192],[113.538,22.193],[113.542,22.1935],[113.546,22.193],[113.549,22.1925]]],
["Av. Infante D. Henrique","primary",[[113.549,22.188],[113.5505,22.192],[113.551,22.196],[113.5515,22.200],[113.552,22.204]]],
["Av. de Horta e Costa","primary",[[113.544,22.195],[113.5442,22.198],[113.5445,22.201],[113.5448,22.204],[113.545,22.207]]],
["Av. Conselheiro F. Almeida","secondary",[[113.542,22.1935],[113.5435,22.1955],[113.545,22.1975],[113.5465,22.1995]]],
["Av. Almirante Lacerda","secondary",[[113.544,22.205],[113.546,22.2055],[113.548,22.205],[113.550,22.2045],[113.552,22.204]]],
["Rua de Cinco de Outubro","tertiary",[[113.5385,22.1915],[113.540,22.192],[113.542,22.1935],[113.5435,22.1945]]],
["Rua do Campo","tertiary",[[113.5425,22.196],[113.544,22.1965],[113.5455,22.196],[113.547,22.1955]]],
["Rua das Lorchas","secondary",[[113.533,22.190],[113.534,22.192],[113.535,22.194],[113.536,22.196]]],
["Estrada S. Francisco","tertiary",[[113.548,22.193],[113.549,22.195],[113.550,22.197],[113.5505,22.198]]]
];

// ========== BUILD LEGEND BUTTONS ==========
var lgGrid=document.getElementById('lgGrid');
var cats=Object.keys(CC);
cats.forEach(function(cat){
var b=document.createElement('button');b.className='lg-btn active';b.dataset.cat=cat;
b.innerHTML='<span class="lg-dot" style="background:'+CC[cat]+'"></span>'+CL[cat];
b.addEventListener('click',function(){toggleCat(cat);});
lgGrid.appendChild(b);
});

// ========== STATE ==========
var activeFilter=null; // null = show all
var allMarkers=[];
var innerDotsGroup=L.layerGroup().addTo(map);

// ========== ROAD LAYER ==========
var roadLayer=L.geoJSON({type:"FeatureCollection",features:R.map(function(r){
return{type:"Feature",properties:{name:r[0],type:r[1]},geometry:{type:"LineString",coordinates:r[2]}};
})},{
style:function(f){return{color:'#999',weight:RW[f.properties.type]||2,opacity:0.6,lineJoin:'round',lineCap:'round'};},
onEachFeature:function(f,ly){
ly.bindPopup('<div class="pu"><div class="pu-name">'+f.properties.name+'</div><div class="pu-row"><b>Tipe:</b>'+f.properties.type+'</div></div>',{maxWidth:240});
ly.on('mouseover',function(){this.setStyle({color:'#6366f1',weight:(RW[f.properties.type]||2)+2,opacity:1});});
ly.on('mouseout',function(){roadLayer.resetStyle(this);});
}
}).addTo(map);

// ========== HEALTH LAYER ==========
var healthGJ={type:"FeatureCollection",features:H.map(function(h){
return{type:"Feature",properties:{name:h[0],type:h[1],address:h[2]},geometry:{type:"Point",coordinates:[h[3],h[4]]}};
})};

var healthLayer=L.geoJSON(healthGJ,{
pointToLayer:function(f,ll){
var c=CC[f.properties.type]||'#fff';
var inner=L.circleMarker(ll,{radius:3,fillColor:'#000',fillOpacity:0.9,color:'#000',weight:0,interactive:false});
innerDotsGroup.addLayer(inner);
var outer=L.circleMarker(ll,{radius:9,fillColor:c,fillOpacity:0.85,color:'#1e293b',weight:2});
return outer;
},
onEachFeature:function(f,ly){
var p=f.properties,co=f.geometry.coordinates;
var gl='https://www.google.com/maps?q='+co[1]+','+co[0];
ly.bindPopup('<div class="pu"><div class="pu-name">'+p.name+'</div><span class="pu-badge" style="background:'+CC[p.type]+'30;color:'+CC[p.type]+'">'+CL[p.type]+'</span><div class="pu-row" style="margin-top:8px"><b>Alamat:</b>'+p.address+'</div><a class="pu-link" href="'+gl+'" target="_blank">&#128205; Google Maps</a></div>',{maxWidth:260});
allMarkers.push({name:p.name,type:p.type,address:p.address,lat:co[1],lng:co[0],layer:ly,innerDot:innerDotsGroup.getLayers()[innerDotsGroup.getLayers().length-1]});
}
}).addTo(map);

// ========== FILTER LOGIC ==========
function toggleCat(cat){
if(activeFilter===cat){activeFilter=null;}else{activeFilter=cat;}
applyView();
}
function resetFilter(){activeFilter=null;applyView();}

function applyView(){
var q=document.getElementById('qInput').value.toLowerCase().trim();
// Update legend button styles
document.querySelectorAll('.lg-btn').forEach(function(b){
if(!activeFilter){b.classList.add('active');b.classList.remove('dimmed');}
else if(b.dataset.cat===activeFilter){b.classList.add('active');b.classList.remove('dimmed');}
else{b.classList.remove('active');b.classList.add('dimmed');}
});
// Filter markers
var visible=[];
allMarkers.forEach(function(m){
var catMatch=!activeFilter||m.type===activeFilter;
var qMatch=!q||m.name.toLowerCase().indexOf(q)!==-1||CL[m.type].toLowerCase().indexOf(q)!==-1;
var show=catMatch&&qMatch;
if(show){healthLayer.addLayer(m.layer);innerDotsGroup.addLayer(m.innerDot);visible.push(m);}
else{healthLayer.removeLayer(m.layer);innerDotsGroup.removeLayer(m.innerDot);}
});
renderList(visible);
updateStats(visible);
}

// ========== STATS ==========
function updateStats(list){
var h=0,c=0,p=0;
list.forEach(function(m){if(m.type==='hospital')h++;if(m.type==='clinic')c++;if(m.type==='pharmacy')p++;});
document.getElementById('cntH').textContent=h;
document.getElementById('cntC').textContent=c;
document.getElementById('cntP').textContent=p;
}

// ========== RESULTS LIST ==========
function renderList(list){
var el=document.getElementById('resList');
if(!list.length){el.innerHTML='<div class="no-result">Tidak ada hasil ditemukan</div>';return;}
el.innerHTML='';
list.forEach(function(m){
var d=document.createElement('div');d.className='ri';
d.innerHTML='<div class="ri-dot" style="background:'+CC[m.type]+'"></div><div class="ri-info"><div class="ri-name">'+m.name+'</div><div class="ri-cat">'+CL[m.type]+'</div></div>';
d.addEventListener('click',function(){
map.flyTo([m.lat,m.lng],17,{duration:1.2});
setTimeout(function(){m.layer.openPopup();},1300);
});
el.appendChild(d);
});
}

// ========== SEARCH INPUT ==========
document.getElementById('qInput').addEventListener('input',function(){applyView();});

// ========== INIT ==========
applyView();
</script>
</body>
</html>
